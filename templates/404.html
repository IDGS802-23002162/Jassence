<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Error 404 - Página no encontrada</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    max-width:600px;
}

.error{
    font-size:120px;
    font-weight:bold;
    margin:0;
    animation: flotar 3s ease-in-out infinite;
}

@keyframes flotar{
    0%{ transform: translateY(0px);}
    50%{ transform: translateY(-15px);}
    100%{ transform: translateY(0px);}
}

.texto{
    font-size:24px;
    margin-bottom:10px;
}

.descripcion{
    font-size:16px;
    color:#ccc;
    margin-bottom:30px;
}

.boton{
    display:inline-block;
    padding:15px 30px;
    background:#00c6ff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.boton:hover{
    background:#0072ff;
    transform: scale(1.05);
}

</style>

</head>
<body>

<div class="container">

<h1 class="error">404</h1>

<div class="texto">
Página no encontrada
</div>

<div class="descripcion">
Lo sentimos, la página que buscas no existe o fue movida.
</div>

<a href="/" class="boton">
Volver al inicio
</a>

</div>

</body>
</html>
