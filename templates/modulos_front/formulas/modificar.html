{% extends "layout_sistema.html" %}

{% block title %}Modificar Fórmula{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in">
    
    <div class="flex items-center justify-between mb-8 border-b border-gray-300 pb-4">
        <div>
            <h1 class="font-elegant text-5xl text-black cursor-default">
                Modificar Fórmula
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Define las proporciones y la descripción para guardar la fórmula.</p>
        </div>
        
        <a href="/explosion-materiales" class="flex items-center text-sm font-medium text-gray-500 hover:text-black transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Regresar
        </a>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
        
        <form class="space-y-8" action="#" method="POST">
            
            <div class="relative z-0 w-full group">
                <input type="text" name="nombre_perfume" id="nombre_perfume" value="{{ datos.nombre_perfume if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                <label for="nombre_perfume" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Nombre de la Fórmula</label>
            </div>

            <div class="relative z-0 w-full group">
                <input type="text" name="inspiracion" id="inspiracion" value="{{ datos.inspiracion if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                <label for="inspiracion" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Inspiración (Ej. Dior, Chanel)</label>
            </div>

            <div class="relative z-0 w-full group">
                <textarea name="descripcion" id="descripcion" rows="3" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer resize-none" placeholder=" ">{{ datos.descripcion if datos else '' }}</textarea>
                <label for="descripcion" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Descripción o Notas Olfativas</label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-4">
                
                <div class="relative z-0 w-full group">
                    <input type="number" step="0.01" name="esencia" id="esencia" value="{{ datos.esencia if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                    <label for="esencia" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Esencia (%)</label>
                </div>

                <div class="relative z-0 w-full group">
                    <input type="number" step="0.01" name="etanol" id="etanol" value="{{ datos.etanol if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                    <label for="etanol" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Etanol (%)</label>
                </div>

                <div class="relative z-0 w-full group">
                    <input type="number" step="0.01" name="fijador" id="fijador" value="{{ datos.fijador if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                    <label for="fijador" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Fijador (%)</label>
                </div>

            </div>

            <div class="flex justify-end gap-4 pt-6 mt-8 border-t border-gray-100">
                <a href="/explosion-materiales" class="py-2.5 px-6 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-300 hover:bg-gray-100 hover:text-black transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="text-white bg-black hover:bg-gray-800 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-8 py-2.5 transition-colors shadow-lg">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
