<div id="modal-recibir-compra" tabindex="-1" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-[60] justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full bg-black/50">
    <div class="relative p-4 w-full max-w-md max-h-full animate-fade-in">
        <div class="relative bg-white rounded-lg shadow-xl border border-gray-100">
            
            <button type="button" onclick="cerrarModalRecibirC()" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-100 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center">
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
            </button>
            
            <div class="p-6 text-center">
                <div class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-green-100 sm:mx-auto sm:h-14 sm:w-14">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                
                <h3 class="mb-2 text-xl font-elegant text-gray-900">¿Confirmar recepción?</h3>
                <p class="mb-6 text-sm text-gray-500">
                    Estás a punto de confirmar la recepción física de la compra a <strong id="proveedor-a-recibir" class="text-black"></strong>. 
                    El stock se sumará inmediatamente a tu inventario.
                </p>
                
                <form id="form-recibir-compra" action="" method="POST" class="flex justify-center gap-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <button type="button" onclick="cerrarModalRecibirC()" class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-colors">
                        Sí, recibir mercancía
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ----- Lógica para el modal de Recibir Compra -----
    const modalRecibir = document.getElementById('modal-recibir-compra');
    
    function abrirModalRecibirC(actionUrl, nombreProveedor) {
        // 1. Asignar el nombre del proveedor al texto del modal
        document.getElementById('proveedor-a-recibir').textContent = nombreProveedor;
        
        // 2. Asignar la ruta correcta (con el ID) al formulario
        document.getElementById('form-recibir-compra').action = actionUrl;
        
        // 3. Mostrar el modal
        modalRecibir.classList.remove('hidden');
        modalRecibir.classList.add('flex');
    }

    function cerrarModalRecibirC() {
        // Ocultar el modal
        modalRecibir.classList.add('hidden');
        modalRecibir.classList.remove('flex');
    }
</script>
