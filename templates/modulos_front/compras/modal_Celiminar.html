<div id="modal-eliminar-compra" tabindex="-1" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-[60] justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full bg-black/50 animate-fade-in">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-xl border border-gray-100">
            
            <button type="button" onclick="cerrarModalC()" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-100 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition-colors">
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
            </button>
            
            <div class="p-6 text-center">
                <div class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-red-100 sm:mx-auto sm:h-14 sm:w-14">
                    <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
                
                <h3 class="mb-2 text-xl font-elegant text-gray-900">¿Anular Registro?</h3>
                <p class="mb-6 text-sm text-gray-500">
                    Estás por eliminar la compra del <strong id="fecha-compra-txt" class="text-black"></strong> <br>
                    del proveedor <span id="proveedor-compra-txt" class="font-bold text-black"></span>.
                </p>
                
                <form id="form-eliminar-compra" action="#" method="POST" class="flex justify-center gap-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <button type="button" onclick="cerrarModalC()" class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
                        Mantener Registro
                    </button>
                    <button type="submit" class="text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-colors">
                        Confirmar Cancelación
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Este JS se queda exactamente igual que el que ya tenías
    const modalC = document.getElementById('modal-eliminar-compra');
    const fechaTxt = document.getElementById('fecha-compra-txt');
    const proveedorTxt = document.getElementById('proveedor-compra-txt');
    const formularioC = document.getElementById('form-eliminar-compra');

    function abrirModalEliminarC(id, fecha, proveedor) {
        fechaTxt.textContent = fecha;
        proveedorTxt.textContent = proveedor;
        formularioC.action = "{{ url_for('compras.cancelar_C', id=0) }}".replace('0', id);
        
        modalC.classList.remove('hidden');
        modalC.classList.add('flex');
    }

    function cerrarModalC() {
        modalC.classList.add('hidden');
        modalC.classList.remove('flex');
    }

    window.onclick = function(event) {
        if (event.target == modalC) {
            cerrarModalC();
        }
    }
</script>
