{% extends "layout_sistema.html" %}

{% block title %}Punto de Venta{% endblock %}

{% block content %}
<br>
<div class="flex flex-col lg:flex-row gap-8 min-h-[calc(100vh-8rem)] animate-fade-in -mt-4">
    
    <div class="lg:w-2/3 flex flex-col">
        
        <div class="flex items-center mb-8">
            <h1 class="font-elegant text-7xl text-black mr-6 cursor-default">
                Productos
            </h1>
        </div>

        <div class="mb-8 relative w-full">
            <input type="text" class="block w-full p-3.5 pr-10 text-sm text-gray-900 bg-white border border-gray-300 rounded-full focus:ring-black focus:border-black shadow-sm" placeholder="Ingresa el nombre/codigo del perfume">
            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/></svg>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-8">
            
         

        </div>
    </div>

    <div class="lg:w-1/3 bg-white border border-gray-200 shadow-sm rounded-lg p-6 flex flex-col sticky top-24 h-[calc(100vh-8rem)]">
        
        <h2 class="text-xl font-bold text-gray-900 mb-6">Venta Actual</h2>
        
        <div class="flex-grow overflow-y-auto mb-6 pr-1">
            <table class="w-full text-sm text-left text-gray-900">
                <thead class="text-xs font-bold text-gray-900 uppercase border-b border-gray-300">
                    <tr>
                        <th scope="col" class="py-3">Producto</th>
                        <th scope="col" class="py-3 text-center">Cant</th>
                        <th scope="col" class="py-3 text-center">Precio</th>
                        <th scope="col" class="py-3 text-right">Total</th>
                        <th scope="col" class="py-3 w-8"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b border-gray-100 group">
                        <td class="py-4 font-medium">Perfume 30ml</td>
                        <td class="py-4 text-center">1</td>
                        <td class="py-4 text-center">$150</td>
                        <td class="py-4 text-right font-medium">$150</td>
                        <td class="py-4 text-right pl-2">
                            <button type="button" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none" title="Quitar producto">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </td>
                    </tr>
                    <tr class="border-b border-gray-100 group">
                        <td class="py-4 font-medium">Perfume 50ml</td>
                        <td class="py-4 text-center">2</td>
                        <td class="py-4 text-center">$220</td>
                        <td class="py-4 text-right font-medium">$440</td>
                        <td class="py-4 text-right pl-2">
                            <button type="button" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none" title="Quitar producto">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="border-t border-gray-200 pt-6">
            <h3 class="text-2xl font-bold text-gray-900 mb-6">Total: $590</h3>
            
            <form action="#" method="POST">
                <div class="mb-6">
                    <label for="metodo_pago" class="block mb-2 text-sm font-bold text-gray-900">Método de Pago</label>
                    <select id="metodo_pago" name="metodo_pago" class="bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-sm focus:ring-black focus:border-black block w-full p-3">
                        <option value="efectivo">Efectivo</option>
                        <option value="tarjeta">Tarjeta de Crédito / Débito</option>
                        <option value="transferencia">Transferencia</option>
                    </select>
                </div>

                <button type="submit" class="w-full text-white bg-[#1A1A1A] hover:bg-black font-medium text-lg px-5 py-4 transition-colors">
                    Finalizar Venta
                </button>
            </form>
        </div>

    </div>

</div>
{% endblock %}
