<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jassence - {% block title %}Tienda{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <style>
        /* Color de fondo crema basado en tu diseño */
        body { background-color: #F6F5F0; }
        
        /* Fuente elegante por si la usas en banners de la tienda */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        .font-elegant { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="font-sans antialiased text-gray-900">

    <nav class="bg-white w-full border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex-shrink-0">
                        <img src="{{ url_for('static', filename='img/NFNL-Logo.png') }}" class="h-12" alt="Logo Jassence">
                    </a>
                    <div class="hidden lg:flex space-x-6">
                        <a href="/" class="text-gray-800 hover:text-black font-semibold text-base transition-colors">Inicio</a>
                        <a href="/nosotros" class="text-gray-800 hover:text-black font-semibold text-base transition-colors">Sobre nosotros</a>
                        <a href="/tienda" class="text-gray-800 hover:text-black font-semibold text-base transition-colors">Tienda</a>
                    </div>
                </div>

                <div class="flex-1 max-w-2xl mx-8 hidden md:block">
                    <div class="relative w-full">
                        <input type="text" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-full focus:ring-black focus:border-black block py-2.5 px-5 pr-10 shadow-sm transition-shadow" placeholder="Buscar">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/></svg>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-6">
                    <a href="/carrito" class="text-gray-800 hover:text-black transition-colors relative flex items-center">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </a>
                    
                    <a href="/login" class="text-white bg-black hover:bg-gray-800 font-medium rounded-md text-sm px-6 py-2.5 transition-colors shadow-sm hidden sm:block">
                        Iniciar Sesión
                    </a>
                </div>

            </div>
        </div>
    </nav>

    <div class="bg-[#8A8A8A] w-full shadow-sm z-40 relative">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-center space-x-8 h-10">
                <a href="/categorias" class="text-gray-900 font-medium text-sm hover:text-white transition-colors">Categorias</a>
                <a href="/hombre" class="text-gray-900 font-medium text-sm hover:text-white transition-colors">Hombre</a>
                <a href="/mujer" class="text-gray-900 font-medium text-sm hover:text-white transition-colors">Mujer</a>
                <a href="/sucursales" class="text-gray-900 font-medium text-sm hover:text-white transition-colors">Sucursales</a>
            </div>
        </div>
    </div>

    <main class="w-full min-h-[calc(100vh-7.5rem)]">
        {% block content %}
        
        {% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
