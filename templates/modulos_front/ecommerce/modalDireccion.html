<div id="modal-direccion" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-center items-center p-4">
    <div class="relative w-full max-w-lg max-h-[90vh] overflow-y-auto animate-fade-in">
        <div class="relative bg-white p-6 rounded-lg shadow-sm border border-gray-100 text-black">
            
            <div class="flex items-center justify-between mb-4 border-b border-gray-300 pb-2">
                <div>
                    <h1 class="font-elegant text-2xl text-black cursor-default">Nueva Dirección</h1>
                    <p class="text-gray-500 text-xs">Ingresa los datos para enviar tu pedido.</p>
                </div>
                <button onclick="cerrarModal('modal-direccion')" class="text-gray-500 hover:text-black transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <form action="{{ url_for('ecommerce.modal_direcciones') }}" method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative z-0 w-full group">
                        <input name="nombre" type="text" id="dir_nombre" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_nombre" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Nombre</label>
                    </div>
                    <div class="relative z-0 w-full group">
                        <input name="telefono" type="text" id="dir_telefono" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_telefono" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Teléfono</label>
                    </div>
                </div>

                <div class="relative z-0 w-full group">
                    <input name="calle" type="text" id="dir_calle" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                    <label for="dir_calle" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Calle y Número</label>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative z-0 w-full group">
                        <input name="colonia" type="text" id="dir_colonia" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_colonia" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Colonia</label>
                    </div>
                    <div class="relative z-0 w-full group">
                        <input name="cp" type="text" id="dir_cp" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_cp" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">C.P.</label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative z-0 w-full group">
                        <input name="ciudad" type="text" id="dir_ciudad" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_ciudad" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Ciudad</label>
                    </div>
                    <div class="relative z-0 w-full group">
                        <input name="estado" type="text" id="dir_estado" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                        <label for="dir_estado" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Estado</label>
                    </div>
                </div>

                <div class="relative z-0 w-full group">
                    <input name="referencias" type="text" id="dir_ref" class="block py-2 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " />
                    <label for="dir_ref" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Referencias (Opcional)</label>
                </div>

                <div class="flex items-center gap-2">
                    <input name="es_principal" type="checkbox" id="dir_principal" class="w-4 h-4 text-black bg-gray-100 border-gray-300 rounded focus:ring-black">
                    <label for="dir_principal" class="text-xs font-medium text-gray-700">Dirección predeterminada</label>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="cerrarModal('modal-direccion')" class="py-2 px-4 text-xs font-medium text-gray-900 bg-white rounded-lg border border-gray-300 hover:bg-gray-100">Cancelar</button>
                    <button type="submit" class="text-white bg-black hover:bg-gray-800 font-medium rounded-lg text-xs px-6 py-2 shadow-lg">Guardar Dirección</button>
                </div>
            </form>
        </div>
    </div>
</div>
