<div id="modal-reactivar-global" tabindex="-1" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-[60] justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full animate-fade-in">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-xl border border-gray-100">
            
            <button type="button" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-100 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center" data-modal-hide="modal-reactivar-global">
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
            </button>
            
            <div class="p-6 text-center">
                {# Icono en azul para indicar reactivación #}
                <div class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 sm:mx-auto sm:h-14 sm:w-14">
                    <svg class="w-6 h-6 text-blue-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 3v4m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                    </svg>
                </div>
                
                <h3 class="mb-2 text-xl font-elegant text-gray-900">¿Reactivar usuario?</h3>
                <p class="mb-6 text-sm text-gray-500">
                    Estás a punto de devolver el acceso a <strong id="nombre-a-reactivar" class="text-black"></strong>. 
                    El usuario podrá volver a iniciar sesión con sus credenciales actuales.
                </p>
                
                {# Acción apuntando a la ruta de reactivar #}
                <form id="form-reactivar-usuario" action="{{ url_for('usuarios.reactivar_usuario') }}" method="POST" class="flex justify-center gap-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    {# Input oculto para el ID #}
                    <input type="hidden" name="id" id="usuario-id-reactivar" value="">

                    <button data-modal-hide="modal-reactivar-global" type="button" class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-colors">
                        Sí, reactivar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
