{% extends "layout_sistema.html" %}

{% block title %}{{ accion }} Rol{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in">
    
    <div class="flex items-center justify-between mb-8 border-b border-gray-300 pb-4">
        <div>
            <h1 class="font-elegant text-5xl text-black cursor-default">
                {{ accion }} Rol
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Define el nombre y los permisos para este rol.</p>
        </div>
        
        <a href="/roles" class="flex items-center text-sm font-medium text-gray-500 hover:text-black transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Regresar
        </a>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
        
        <form class="space-y-6" action="#" method="POST">
            
            <div class="relative z-0 w-full group">
                <input type="text" name="nombre_rol" id="nombre_rol" value="{{ datos.nombre_rol if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                <label for="nombre_rol" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Nombre del Rol</label>
            </div>

            <div class="relative z-0 w-full group">
                <input type="text" name="permisos" id="permisos" value="{{ datos.permisos if datos else '' }}" class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer" placeholder=" " required />
                <label for="permisos" class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Permisos (Ej. Lectura, Escritura)</label>
            </div>

            <div class="flex justify-end gap-4 pt-6 mt-6 border-t border-gray-100">
                <a href="/roles" class="py-2.5 px-6 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-300 hover:bg-gray-100 hover:text-black transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="text-white bg-black hover:bg-gray-800 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-8 py-2.5 transition-colors shadow-lg">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
