<div id="modal-confirmar-estado" tabindex="-1" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-[60] justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-xl border border-gray-100">
            
            <button type="button" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-100 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center" data-modal-hide="modal-confirmar-estado">
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
            </button>
            
            <div class="p-6 text-center">
                <div class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 sm:mx-auto sm:h-14 sm:w-14">
                    <svg class="w-6 h-6 text-blue-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                
                <h3 class="mb-2 text-xl font-bold text-gray-900" id="titulo-modal-produccion">¿Cambiar estado?</h3>
                <p class="mb-6 text-sm text-gray-500" id="mensaje-modal-produccion">Estás a punto de avanzar la orden a la siguiente etapa.</p>
                
                <form id="form-estado-produccion" action="#" method="POST" class="flex justify-center gap-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button data-modal-hide="modal-confirmar-estado" type="button" class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="text-white bg-black hover:bg-gray-800 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 transition-colors">
                        Confirmar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function prepararCambioEstado(id, accion) {
    const titulo = document.getElementById('titulo-modal-produccion');
    const mensaje = document.getElementById('mensaje-modal-produccion');
    const form = document.getElementById('form-estado-produccion');

    if (accion === 'iniciar') {
        titulo.textContent = '¿Iniciar Producción?';
        mensaje.textContent = 'La orden pasará a estado de proceso en fábrica.';
        form.action = '/produccion/ordenes/iniciar/' + id;
    } else if (accion === 'finalizar') {
        titulo.textContent = '¿Finalizar Producción?';
        mensaje.textContent = 'Se descontarán automáticamente los insumos del inventario. Esta acción no se puede deshacer.';
        form.action = '/produccion/ordenes/finalizar/' + id;
    }
}
</script>
