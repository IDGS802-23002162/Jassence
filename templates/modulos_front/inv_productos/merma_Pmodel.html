<!-- MODAL MERMA -->

<div id="modal-merma" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-center items-center p-4">

    <div class="relative w-full max-w-2xl max-h-full">
        <div class="relative bg-white border border-gray-200 rounded-base shadow-sm p-4 md:p-6 text-black">

            <!-- HEADER -->
            <div class="flex items-center justify-between border-b pb-4">
                <h3 class="text-lg font-bold">Registrar Merma</h3>
                <button onclick="cerrarModal('modal-merma')" class="text-gray-400 hover:text-black">✕</button>
            </div>

            <!-- FORM -->
            <div class="py-6">
                <form id="form-merma" class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="item_id" id="merma_item_id">
                    <input type="hidden" name="tipo_item" value="producto_terminado">

                    <!-- PRODUCTO -->
                    <div class="md:col-span-2">
                        <label class="text-sm font-medium">Producto</label>
                        <input id="merma_nombre" class="w-full bg-gray-100 p-2 rounded-base" disabled>
                    </div>

                    <!-- ETAPA -->
                    <div>
                        <label class="text-sm font-medium">Etapa</label>
                        <select name="etapa" class="w-full border p-2 rounded-base">
                            <option value="Almacén">Almacén</option>
                            <option value="Producción">Producción</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Venta">Punto de Venta</option>
                        </select>
                    </div>

                    <!-- CANTIDAD -->
                    <div>
                        <label class="text-sm font-medium">Cantidad perdida</label>
                        <input type="number" name="cantidad_perdida" class="w-full border p-2 rounded-base">
                    </div>

                    <!-- UNIDAD -->
                    <div>
                        <label class="text-sm font-medium">Unidad</label>
                        <input type="text" name="unidad_medida" value="Botellas"
                            class="w-full border p-2 rounded-base bg-gray-100">
                    </div>

                    <!-- LOTE / ORDEN -->
                    <div>
                        <label class="text-sm font-medium">Orden / Lote</label>
                        <input type="text" name="orden_produccion_id"
                            class="w-full border p-2 rounded-base"
                            placeholder="Ej. L-2024-001">
                    </div>

                    <!-- MOTIVO -->
                    <div class="md:col-span-2">
                        <label class="text-sm font-medium">Motivo</label>
                        <select name="motivo" class="w-full border p-2 rounded-base">
                            <option value="Ruptura">Ruptura</option>
                            <option value="Caducidad">Caducidad</option>
                            <option value="Defecto">Defecto</option>
                            <option value="Robo">Robo</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <!-- DESCRIPCIÓN -->
                    <div class="md:col-span-2">
                        <label class="text-sm font-medium">Descripción</label>
                        <textarea name="descripcion" rows="3"
                            class="w-full border p-2 rounded-base"
                            placeholder="Explica qué pasó..."></textarea>
                    </div>

                </form>
            </div>

            <!-- BOTONES -->
            <div class="flex gap-4 pt-4 border-t">
                <button type="submit" form="form-merma"
                    class="flex-1 bg-black text-white p-2 rounded-base">
                    Guardar
                </button>

                <button onclick="cerrarModal('modal-merma')"
                    class="flex-1 border p-2 rounded-base">
                    Cancelar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- SCRIPT -->
<script>
function abrirModalMerma(id = '', nombre = '') {
    document.getElementById('modal-merma').classList.remove('hidden');
    document.getElementById('merma_nombre').value = nombre || '';
    document.getElementById('merma_item_id').value = id || '';
}

function cerrarModal(id) {
    document.getElementById(id).classList.add('hidden');
}
</script>
