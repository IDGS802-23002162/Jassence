<div id="modal-merma" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-center items-center p-4">

    <div class="relative w-full max-w-2xl max-h-full animate-fade-in">
        <div class="relative bg-white p-8 rounded-lg shadow-sm border border-gray-100 text-black">

            <div class="flex items-center justify-between mb-8 border-b border-gray-300 pb-4">
                <div>
                    <h1 class="font-elegant text-4xl text-black cursor-default">
                        Registrar Merma
                    </h1>
                    <p class="text-gray-500 mt-2 text-sm">Define la cantidad, etapa y motivo de la pérdida.</p>
                </div>

                <button onclick="cerrarModal('modal-merma')"
                    class="flex items-center text-sm font-medium text-gray-500 hover:text-black transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <form id="form-merma" method="POST" class="space-y-8">

                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="item_id" id="merma_item_id">
                <input type="hidden" name="tipo_item" value="producto_terminado">

                <div class="relative z-0 w-full group">
                    <input type="text" id="merma_nombre"
                        class="block py-2.5 px-0 w-full text-sm text-gray-500 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none peer cursor-not-allowed"
                        placeholder=" " readonly />
                    <label for="merma_nombre"
                        class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]">Producto</label>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-2">

                    <div class="relative z-0 w-full group">
                        <select name="etapa" id="etapa"
                            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer cursor-pointer">
                            <option value="Almacén">Almacén</option>
                            <option value="Producción">Producción</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Venta">Punto de Venta</option>
                        </select>
                        <label for="etapa"
                            class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black">
                            Etapa
                        </label>
                    </div>

                    <div class="relative z-0 w-full group">
                        <input type="number" name="cantidad_perdida" id="cantidad_perdida"
                            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer"
                            placeholder=" " required />
                        <label for="cantidad_perdida"
                            class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                            Cantidad Perdida
                        </label>
                    </div>

                    <div class="relative z-0 w-full group">
                        <input type="text" name="unidad_medida" id="unidad_medida" value="Botellas"
                            class="block py-2.5 px-0 w-full text-sm text-gray-500 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none peer cursor-not-allowed"
                            placeholder=" " readonly />
                        <label for="unidad_medida"
                            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]">
                            Unidad
                        </label>
                    </div>

                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-2">

                    <div class="relative z-0 w-full group">
                        <input type="hidden" name="orden_produccion_id" id="orden_produccion_id">

                        <input type="text" id="orden_visual" readonly
                            class="block py-2.5 px-0 w-full text-sm text-gray-500 bg-transparent border-0 border-b-2 border-gray-300">
                    </div>

                    <div class="relative z-0 w-full group">
                        <select name="motivo" id="motivo"
                            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer cursor-pointer">
                            <option value="Ruptura">Ruptura</option>
                            <option value="Caducidad">Caducidad</option>
                            <option value="Defecto">Defecto</option>
                            <option value="Robo">Robo</option>
                            <option value="Otro">Otro</option>
                        </select>
                        <label for="motivo"
                            class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black">
                            Motivo
                        </label>
                    </div>

                </div>

                <div class="relative z-0 w-full group pt-2">
                    <textarea name="descripcion" id="descripcion_merma" rows="2"
                        class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-black peer resize-none"
                        placeholder=" "></textarea>
                    <label for="descripcion_merma"
                        class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-black peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                        Descripción (Explica qué pasó...)
                    </label>
                </div>

                <div class="flex justify-end gap-4 pt-6 mt-8 border-t border-gray-100">
                    <button type="button" onclick="cerrarModal('modal-merma')"
                        class="py-2.5 px-6 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-300 hover:bg-gray-100 hover:text-black transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="text-white bg-black hover:bg-gray-800 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-8 py-2.5 transition-colors shadow-lg">
                        Guardar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    function abrirModalMerma(id = '', nombre = '') {
        document.getElementById('modal-merma').classList.remove('hidden');

        document.getElementById('merma_nombre').value = nombre || '';
        document.getElementById('merma_item_id').value = id || '';
        document.getElementById('form-merma').action = `/merma_Pmodel/${id}`;

        // 🔥 traer orden automáticamente
        fetch(`/ordenes_por_producto/${id}`)
            .then(res => res.json())
            .then(data => {

                console.log("ORDENES:", data); // 👈 DEBUG correcto

                if (data.ordenes.length > 0) {
                    document.getElementById('orden_produccion_id').value = data.ordenes[0].id;
                    document.getElementById('orden_visual').value = `OP-${data.ordenes[0].id}`;
                } else {
                    document.getElementById('orden_produccion_id').value = '';
                    document.getElementById('orden_visual').value = 'Sin orden';
                }

            })
            .catch(err => {
                console.error("ERROR:", err);
                document.getElementById('orden_visual').value = 'Error';
            });
    }
    function cerrarModal(id) {
        document.getElementById(id).classList.add('hidden');
    }
</script>
